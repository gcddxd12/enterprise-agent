# MCP Server 连接配置
# 定义 Agent 需要连接的外部 MCP Server，每个 Server 提供一组业务工具。
#
# 字段说明:
#   name: 显示名称
#   command: 启动命令
#   args: 命令参数
#   env: 环境变量（可选）
#   enabled: 是否启用
#   description: 服务器用途描述

servers:
  billing:
    name: 账单查询服务
    command: python
    args:
      - "-u"
      - "./mcp_servers/billing_server.py"
    env:
      PYTHONPATH: "."
    enabled: true
    description: 提供实时账单查询、余额查询、消费明细、流量余量、缴费记录等功能

  ticket:
    name: 工单系统服务
    command: python
    args:
      - "-u"
      - "./mcp_servers/ticket_server.py"
    env:
      PYTHONPATH: "."
    enabled: true
    description: 提供工单创建、状态查询、工单详情、工单列表、催办等功能
